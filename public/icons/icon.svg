<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1929"/>
      <stop offset="100%" stop-color="#162d50"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="rgba(59,130,246,0.25)"/>
      <stop offset="100%" stop-color="rgba(59,130,246,0)"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="8" flood-color="rgba(0,0,0,0.5)"/>
    </filter>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>

  <!-- 電路板裝飾線條（左上） -->
  <g stroke="rgba(59,130,246,0.12)" stroke-width="1.5" fill="none">
    <path d="M60,120 h30 v-40 h20"/>
    <path d="M60,150 h50 v30 h15"/>
    <path d="M80,90 v-30 h25"/>
    <circle cx="110" cy="80" r="3" fill="rgba(59,130,246,0.15)"/>
    <circle cx="125" cy="180" r="3" fill="rgba(59,130,246,0.15)"/>
  </g>

  <!-- 電路板裝飾線條（右下） -->
  <g stroke="rgba(59,130,246,0.12)" stroke-width="1.5" fill="none">
    <path d="M452,390 h-30 v40 h-20"/>
    <path d="M452,360 h-50 v-30 h-15"/>
    <path d="M432,420 v30 h-25"/>
    <circle cx="402" cy="430" r="3" fill="rgba(59,130,246,0.15)"/>
    <circle cx="387" cy="330" r="3" fill="rgba(59,130,246,0.15)"/>
  </g>

  <!-- 六角形外框 -->
  <polygon points="256,80 380,152 380,296 256,368 132,296 132,152"
           fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.2"/>

  <!-- 內六角 -->
  <polygon points="256,110 360,168 360,284 256,342 152,284 152,168"
           fill="rgba(29,78,216,0.15)" stroke="rgba(96,165,250,0.15)" stroke-width="1"/>

  <!-- 盾牌形狀底座 -->
  <path d="M256,125 L345,170 L345,280 L256,335 L167,280 L167,170 Z"
        fill="rgba(15,23,42,0.6)" filter="url(#shadow)"/>

  <!-- 主文字 HS -->
  <text x="256" y="240" text-anchor="middle" dominant-baseline="central"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-weight="900" font-size="105" fill="white" letter-spacing="4"
        filter="url(#glow-filter)">HS</text>

  <!-- 小 icon：監視器符號 -->
  <g transform="translate(220,280)" fill="none" stroke="rgba(96,165,250,0.6)" stroke-width="1.5">
    <circle cx="10" cy="8" r="6"/>
    <circle cx="10" cy="8" r="2.5" fill="rgba(96,165,250,0.4)"/>
    <path d="M4,14 L0,18 h20 L16,14"/>
  </g>

  <!-- 小 icon：網路符號 -->
  <g transform="translate(260,280)" fill="none" stroke="rgba(96,165,250,0.6)" stroke-width="1.5">
    <path d="M10,18 v-10"/>
    <path d="M4,12 Q10,2 16,12"/>
    <path d="M1,15 Q10,-2 19,15"/>
    <circle cx="10" cy="18" r="2" fill="rgba(96,165,250,0.4)"/>
  </g>

  <!-- 品牌名稱 -->
  <text x="256" y="400" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-weight="700" font-size="28" fill="rgba(255,255,255,0.9)" letter-spacing="14">HERSHUN</text>

  <!-- 裝飾線 -->
  <line x1="150" y1="420" x2="230" y2="420" stroke="url(#accent)" stroke-width="1.5" opacity="0.4"/>
  <line x1="282" y1="420" x2="362" y2="420" stroke="url(#accent)" stroke-width="1.5" opacity="0.4"/>
  <circle cx="256" cy="420" r="3" fill="rgba(96,165,250,0.5)"/>

  <!-- 底部描述 -->
  <text x="256" y="455" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-weight="300" font-size="16" fill="rgba(255,255,255,0.35)" letter-spacing="6">SMART ENGINEERING</text>
</svg>
